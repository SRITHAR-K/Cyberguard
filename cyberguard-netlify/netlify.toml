[build]
  publish   = "dist"
  command   = "npm run build"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# ── API rewrites → Netlify Functions ──────────────────────────
[[redirects]]
  from   = "/api/auth/*"
  to     = "/.netlify/functions/auth/:splat"
  status = 200

[[redirects]]
  from   = "/api/analysis/*"
  to     = "/.netlify/functions/analysis/:splat"
  status = 200

[[redirects]]
  from   = "/api/admin/*"
  to     = "/.netlify/functions/admin/:splat"
  status = 200

[[redirects]]
  from   = "/api/health"
  to     = "/.netlify/functions/health"
  status = 200

# ── SPA fallback (React Router) ───────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[dev]
  command    = "npm run dev"
  port       = 8888
  targetPort = 5173
  functions  = "netlify/functions"
